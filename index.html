<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure VRM Viewer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f172a;
            
            /* 簡易セキュリティ: テキスト選択とスマホの長押しメニューを禁止 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        #canvas-container {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10;
        }
        .page-transition {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transition: opacity 0.3s, transform 0.3s, visibility 0.3s;
        }
        .hidden-page {
            opacity: 0; pointer-events: none; visibility: hidden; transform: scale(0.98); z-index: 0;
        }
        .active-page {
            opacity: 1; pointer-events: auto; visibility: visible; transform: scale(1); z-index: 20;
        }
        /* ドラッグ＆ドロップエリアのハイライト */
        .drag-active {
            border-color: #6366f1 !important;
            background-color: rgba(99, 102, 241, 0.1) !important;
        }
    </style>
    <!-- Three.js & VRM -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.0.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body oncontextmenu="return false;"> <!-- 簡易セキュリティ: 右クリック禁止 -->

    <!-- ========================================== -->
    <!-- 1. メイン画面 (ファイル選択とパスワード入力) -->
    <!-- ========================================== -->
    <div id="page-main" class="page-transition active-page flex items-center justify-center bg-slate-950 text-white p-4 overflow-y-auto">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <div class="inline-flex p-3 bg-indigo-600/10 text-indigo-400 rounded-full mb-3">
                    <i data-lucide="shield-check" class="w-8 h-8"></i>
                </div>
                <h2 class="text-xl font-bold tracking-tight">セキュアモデルビューアー</h2>
                <p class="text-xs text-slate-400 mt-2">提供された暗号化モデル(.ViVionDat)を選択してください</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">復号パスワード</label>
                    <input type="password" id="view-password" required 
                        class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" 
                        placeholder="パスワードを入力">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">モデルファイル (.ViVionDat)</label>
                    <div id="drop-zone-view" class="border-2 border-dashed border-slate-700 rounded-xl p-8 text-center transition-colors hover:border-indigo-500 cursor-pointer bg-slate-950/50">
                        <i data-lucide="upload-cloud" class="w-10 h-10 text-slate-500 mx-auto mb-3"></i>
                        <p class="text-sm font-medium text-slate-300">ここをタップしてファイルを選択<br><span class="text-xs text-slate-500 font-normal">またはドラッグ＆ドロップ</span></p>
                        <input type="file" id="file-input-view" accept=".ViVionDat,.vrm" class="hidden">
                    </div>
                </div>
                
                <div id="view-error" class="hidden text-xs text-rose-500 bg-rose-500/10 border border-rose-500/20 rounded px-3 py-2 text-center">
                    パスワードが間違っているか、ファイルが破損しています。
                </div>
            </div>
            
            <div class="mt-8 pt-6 border-t border-slate-800/60 text-center">
                <p class="text-[10px] text-slate-500">※ファイルの復号はすべてお使いの端末(ブラウザ上)で行われます。<br>サーバーへのデータ送信は一切行われません。</p>
            </div>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- 2. 3D ビュー画面 -->
    <!-- ========================================== -->
    <div id="page-view" class="page-transition hidden-page">
        <div id="canvas-container"></div>

        <!-- オーバーレイUI -->
        <div class="absolute inset-0 z-30 pointer-events-none flex flex-col justify-between p-4 md:p-6">
            <div class="flex justify-between items-start">
                <div class="bg-slate-900/90 backdrop-blur border border-slate-800 p-3 md:p-4 rounded-xl text-white pointer-events-auto shadow-lg">
                    <div class="flex items-center gap-2">
                        <span class="inline-block w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                        <h4 id="current-model-title" class="font-bold text-sm md:text-base">Model</h4>
                    </div>
                </div>

                <button onclick="backToMain()" class="bg-slate-900/90 hover:bg-slate-800 backdrop-blur border border-slate-800 text-slate-300 hover:text-white px-3 py-2 md:px-4 md:py-2.5 rounded-xl flex items-center gap-2 text-xs md:text-sm pointer-events-auto transition-all shadow-lg">
                    <i data-lucide="x" class="w-4 h-4"></i>
                    <span>閉じる</span>
                </button>
            </div>

            <!-- 操作ヘルプとリセット -->
            <div class="flex flex-row gap-2 md:gap-3 justify-between items-end">
                <div id="camera-hints" class="bg-slate-900/90 backdrop-blur border border-slate-800 p-2.5 md:p-4 rounded-xl text-[10px] md:text-xs text-slate-300 space-y-1.5 pointer-events-auto shadow-lg max-w-[200px] md:max-w-sm">
                    <!-- JSでデバイスに応じて書き換えられます -->
                </div>

                <button onclick="resetCamera()" class="bg-slate-900/90 hover:bg-slate-800 backdrop-blur border border-slate-800 text-white p-2.5 md:p-3 rounded-xl pointer-events-auto transition-all flex items-center gap-1.5 md:gap-2 text-[10px] md:text-xs shadow-lg h-fit">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5 md:w-4 md:h-4"></i>
                    <span>カメラリセット</span>
                </button>
            </div>
        </div>

        <!-- ローディング画面 -->
        <div id="vrm-loader" class="absolute inset-0 bg-slate-950/90 backdrop-blur z-50 flex flex-col items-center justify-center text-white transition-opacity duration-300 opacity-0 pointer-events-none">
            <div class="w-16 h-16 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin mb-6"></div>
            <h3 class="text-lg md:text-xl font-bold tracking-tight mb-2">モデルを構築中...</h3>
            <p class="text-xs text-slate-400">ブラウザ上で安全に処理しています</p>
        </div>
    </div>


    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        lucide.createIcons();

        // ----------------------------------------------------
        // デバイス判定とUI初期化
        // ----------------------------------------------------
        const isMobile = /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        function updateCameraHints() {
            const hintsEl = document.getElementById('camera-hints');
            if (!hintsEl) return;
            
            if (isMobile) {
                hintsEl.innerHTML = `
                    <span class="font-semibold text-white block mb-1.5">💡 操作マニュアル</span>
                    <div class="flex justify-between items-center"><kbd class="bg-slate-950 px-1.5 py-0.5 rounded text-slate-400 border border-slate-800">1本指ドラッグ</kbd><span>：回転</span></div>
                    <div class="flex justify-between items-center"><kbd class="bg-slate-950 px-1.5 py-0.5 rounded text-slate-400 border border-slate-800">2本指ドラッグ</kbd><span>：移動</span></div>
                    <div class="flex justify-between items-center"><kbd class="bg-slate-950 px-1.5 py-0.5 rounded text-slate-400 border border-slate-800">ピンチ</kbd><span>：ズーム</span></div>
                `;
            } else {
                hintsEl.innerHTML = `
                    <span class="font-semibold text-white block mb-1.5">💡 操作マニュアル</span>
                    <div class="flex justify-between items-center"><kbd class="bg-slate-950 px-1.5 py-0.5 rounded text-slate-400 border border-slate-800">左ドラッグ</kbd><span>：回転</span></div>
                    <div class="flex justify-between items-center mt-1.5"><kbd class="bg-slate-950 px-1.5 py-0.5 rounded text-slate-400 border border-slate-800">右ドラッグ</kbd><span>：移動</span></div>
                    <div class="flex justify-between items-center mt-1.5"><kbd class="bg-slate-950 px-1.5 py-0.5 rounded text-slate-400 border border-slate-800">スクロール</kbd><span>：ズーム</span></div>
                `;
            }
        }
        updateCameraHints();

        // ----------------------------------------------------
        // 簡易セキュリティ（ドラッグによる画像保存防止など）
        // ----------------------------------------------------
        document.addEventListener('dragstart', (e) => e.preventDefault());

        // ----------------------------------------------------
        // UI・画面遷移制御
        // ----------------------------------------------------
        window.navigateTo = function(pageId) {
            document.querySelectorAll('.page-transition').forEach(page => {
                page.classList.remove('active-page');
                page.classList.add('hidden-page');
            });
            document.getElementById(pageId).classList.remove('hidden-page');
            document.getElementById(pageId).classList.add('active-page');
            if (pageId !== 'page-view') stopAnimate();
        };

        window.backToMain = function() {
            navigateTo('page-main');
            cleanupVrm();
            document.getElementById('file-input-view').value = '';
        };

        // ----------------------------------------------------
        // 復号ロジック (XORアルゴリズム)
        // ----------------------------------------------------
        function processCryptoData(arrayBuffer, password) {
            if (!password) return arrayBuffer;
            const uint8Array = new Uint8Array(arrayBuffer);
            const keyBytes = new TextEncoder().encode(password);
            for (let i = 0; i < uint8Array.length; i++) {
                uint8Array[i] ^= keyBytes[i % keyBytes.length];
            }
            return uint8Array.buffer;
        }

        // ----------------------------------------------------
        // ファイル入力のセットアップ
        // ----------------------------------------------------
        const dropZone = document.getElementById('drop-zone-view');
        const fileInput = document.getElementById('file-input-view');

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-active');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-active');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const password = document.getElementById('view-password').value;
            if (!password) { 
                alert('先に復号パスワードを入力してください。'); 
                fileInput.value = '';
                return; 
            }
            
            document.getElementById('view-error').classList.add('hidden');
            const reader = new FileReader();
            
            reader.onload = function(e) {
                let finalBuffer = e.target.result;
                
                if (file.name.toLowerCase().endsWith('.viviondat')) {
                    finalBuffer = processCryptoData(finalBuffer, password);
                }
                
                const blob = new Blob([finalBuffer], { type: 'application/octet-stream' });
                const objectUrl = URL.createObjectURL(blob);
                
                loadModelToScene(objectUrl, file.name);
            };
            reader.readAsArrayBuffer(file);
        }

        // ==========================================
        // 3D グラフィックス制御
        // ==========================================
        let scene, camera, renderer, controls, currentVrm, animationFrameId, isAnimating;
        let currentObjectUrl = null;
        let headPosition = new THREE.Vector3(0, 1.4, 0);

        function initThree() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111827);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.NoToneMapping; 
            
            container.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 20.0);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;

            // 操作を業界標準 (左:回転, 右:移動, ホイール:ズーム) に設定
            controls.mouseButtons = { 
                LEFT: THREE.MOUSE.ROTATE, 
                MIDDLE: THREE.MOUSE.DOLLY, 
                RIGHT: THREE.MOUSE.PAN 
            };
            
            // スマホ: 1本指で回転、2本指で移動＆ズーム
            controls.touches = {
                ONE: THREE.TOUCH.ROTATE,
                TWO: THREE.TOUCH.DOLLY_PAN
            };
            
            const mainLight = new THREE.DirectionalLight(0xffffff, Math.PI);
            mainLight.position.set(1.0, 1.0, 1.0).normalize();
            scene.add(mainLight);

            scene.add(new THREE.GridHelper(10, 20, 0x374151, 0x1f2937));
        }

        function cleanupVrm() {
            if (currentVrm) {
                scene.remove(currentVrm.scene);
                currentVrm.scene.traverse((object) => {
                    if (object.isMesh) {
                        object.geometry.dispose();
                        if (object.material.isMaterial) object.material.dispose();
                        else if (Array.isArray(object.material)) object.material.forEach(m => m.dispose());
                    }
                });
                currentVrm = null;
            }
            if (currentObjectUrl) {
                URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = null;
            }
        }

        window.resetCamera = function() {
            if (!controls) return;
            controls.target.copy(headPosition);
            camera.position.set(headPosition.x, headPosition.y + 0.05, headPosition.z + 1.2);
            controls.update();
        };

        function loadModelToScene(objectUrl, fileName) {
            navigateTo('page-view');
            if (!scene) initThree();
            document.getElementById('current-model-title').innerText = fileName;

            const loaderScreen = document.getElementById('vrm-loader');
            loaderScreen.style.opacity = '1';
            
            cleanupVrm();
            currentObjectUrl = objectUrl;

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            loader.load(
                objectUrl,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.updateMatrixWorld(true);

                    let foundHead = false;
                    headPosition.set(0, 1.4, 0);
                    if (vrm.humanoid) {
                        const headBone = vrm.humanoid.getNormalizedBoneNode('head');
                        if (headBone) {
                            headBone.getWorldPosition(headPosition);
                            foundHead = true;
                        }
                    }
                    if (!foundHead) {
                        const box = new THREE.Box3().setFromObject(vrm.scene);
                        headPosition.set(0, box.max.y * 0.9, 0);
                    }

                    resetCamera();
                    loaderScreen.style.opacity = '0';
                    startAnimate();
                },
                undefined,
                (error) => {
                    console.error("モデルの読み込みに失敗しました", error);
                    loaderScreen.style.opacity = '0';
                    document.getElementById('view-error').classList.remove('hidden');
                    backToMain();
                }
            );
        }

        const clock = new THREE.Clock();
        function startAnimate() {
            if (!isAnimating) { isAnimating = true; animate(); }
        }
        function stopAnimate() {
            isAnimating = false;
            if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
        }
        function animate() {
            if (!isAnimating) return;
            animationFrameId = requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(clock.getDelta());
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (!renderer || !camera) return;
            const container = document.getElementById('canvas-container');
            if (container) {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        });
    </script>
</body>
</html>
